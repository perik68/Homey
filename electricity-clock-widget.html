<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electricity Price Clock · SE3</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #1a1a2e;
  }
  .widget {
    width: 320px; border-radius: 20px; overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.08);
  }

  /* ── Clock section ── */
  .clock-section {
    padding: 14px 14px 10px;
    transition: background-color 1.5s ease;
    background: rgba(255,255,255,0.04);
  }
  .clock-header {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 8px;
  }
  .clock-label {
    font-size: 9px; font-weight: 600; letter-spacing: 1.5px;
    text-transform: uppercase; color: rgba(255,255,255,0.45);
  }
  .price-badge {
    font-size: 9px; font-weight: 700; padding: 2px 8px;
    border-radius: 10px; background: rgba(0,0,0,0.3);
    color: rgba(255,255,255,0.85);
  }
  .clock-main { display: flex; align-items: baseline; gap: 5px; margin-bottom: 2px; }
  .time-display {
    font-size: 42px; font-weight: 700; letter-spacing: -2px;
    color: rgba(255,255,255,0.95); line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .seconds-display {
    font-size: 18px; font-weight: 400;
    color: rgba(255,255,255,0.4); font-variant-numeric: tabular-nums; line-height: 1;
  }
  .date-display {
    font-size: 11px; color: rgba(255,255,255,0.45); margin-bottom: 10px;
  }

  /* ── 24-hour bullet ring ── */
  .bullet-ring { display: grid; grid-template-columns: repeat(24, 1fr); gap: 2px; }
  .hour-bullet {
    height: 6px; border-radius: 3px; position: relative;
    background: rgba(255,255,255,0.1); cursor: default;
  }
  .hour-bullet.current {
    height: 10px;
    box-shadow: 0 0 8px var(--clr), 0 0 2px var(--clr);
  }
  .hour-bullet.past { opacity: 0.22; }
  .hour-bullet .tip {
    display: none; position: absolute; bottom: calc(100% + 5px);
    left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.9); color: #fff;
    font-size: 10px; padding: 3px 7px; border-radius: 5px;
    white-space: nowrap; pointer-events: none; z-index: 99;
  }
  .hour-bullet:hover .tip { display: block; }

  /* ── 15-min bar chart ── */
  .prices-section { background: #0d0d1a; padding: 10px 14px 12px; }
  .prices-header {
    font-size: 9px; font-weight: 600; letter-spacing: 1.5px;
    text-transform: uppercase; color: rgba(255,255,255,0.28);
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 7px;
  }
  .status { font-size: 8px; font-weight: 500; letter-spacing: 0; text-transform: none; opacity: 0.85; }
  .status.ok      { color: #4ade80; }
  .status.error   { color: #f87171; }
  .status.loading { color: rgba(255,255,255,0.35); }

  .price-bars { display: flex; gap: 1px; align-items: flex-end; height: 50px; }
  .bar-wrap {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 1px; height: 100%;
    justify-content: flex-end; position: relative;
  }
  .bar {
    width: 100%; border-radius: 1px 1px 0 0; min-height: 2px;
    background: rgba(255,255,255,0.08);
  }
  .bar.now { box-shadow: 0 0 5px var(--clr); }
  .bar-lbl {
    font-size: 6.5px; color: rgba(255,255,255,0.28);
    font-variant-numeric: tabular-nums; line-height: 1;
    min-height: 8px; text-align: center;
  }
  .bar-lbl.now { color: rgba(255,255,255,0.8); font-weight: 700; }
  .bar-wrap .tip {
    display: none; position: absolute; bottom: calc(100% + 4px);
    left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.9); color: #fff;
    font-size: 10px; padding: 3px 7px; border-radius: 5px;
    white-space: nowrap; pointer-events: none; z-index: 99;
  }
  .bar-wrap:hover .tip { display: block; }

  /* ── Stats row ── */
  .stats-row {
    display: flex; justify-content: space-between; margin-top: 8px;
    padding-top: 7px; border-top: 1px solid rgba(255,255,255,0.06);
  }
  .stat { text-align: center; }
  .stat-val { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.8); font-variant-numeric: tabular-nums; }
  .stat-lbl { font-size: 8px; color: rgba(255,255,255,0.28); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 1px; }
  .dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; margin-right: 3px; vertical-align: middle; }
</style>
</head>
<body>
<div class="widget">
  <div class="clock-section" id="clockSec">
    <div class="clock-header">
      <span class="clock-label">&#x26A1; Nordic Spot &middot; SE3</span>
      <span class="price-badge" id="badge">&mdash; &ouml;re/kWh</span>
    </div>
    <div class="clock-main">
      <div class="time-display" id="hhmm">00:00</div>
      <div class="seconds-display" id="ss">00</div>
    </div>
    <div class="date-display" id="dateLine"></div>
    <div class="bullet-ring" id="ring"></div>
  </div>
  <div class="prices-section">
    <div class="prices-header">
      <span>Rolling 12 h &middot; 15 min</span>
      <span class="status loading" id="status">Loading&hellip;</span>
    </div>
    <div class="price-bars" id="bars"></div>
    <div class="stats-row">
      <div class="stat">
        <div class="stat-val" id="sMin">&mdash;</div>
        <div class="stat-lbl"><span class="dot" style="background:#4ade80"></span>Min</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="sAvg">&mdash;</div>
        <div class="stat-lbl">Avg</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="sMax">&mdash;</div>
        <div class="stat-lbl"><span class="dot" style="background:#f87171"></span>Max</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="sNow">&mdash;</div>
        <div class="stat-lbl">Now</div>
      </div>
    </div>
  </div>
</div>

<script>
// ─── Config ───────────────────────────────────────────────────────────────────
// API: elprisetjustnu.se — open, free, CORS-enabled
// Returns array of {SEK_per_kWh, time_start, time_end, ...}
// 96 entries per day (15-min slots) since Oct 2025
var AREA = 'SE3';
var BASE = 'https://www.elprisetjustnu.se/api/v1/prices';

function apiURL(date) {
  var y = date.getFullYear();
  var m = date.getMonth() + 1;
  var d = date.getDate();
  return BASE + '/' + y + '/' + (m < 10 ? '0' : '') + m + '-' + (d < 10 ? '0' : '') + d + '_' + AREA + '.json';
}

// ─── Price storage ────────────────────────────────────────────────────────────
// slots15: flat array indexed 0–95 (today) and 96–191 (tomorrow)
// Each entry: öre/kWh value or null
var slots15 = new Array(192).fill(null);
var fetchedDateKey  = '';
var fetchedTomorrow = false;

// Parse API response array → fill slots15 starting at offset
function parseSlots(arr, offset) {
  for (var i = 0; i < arr.length && (offset + i) < 192; i++) {
    var sek = arr[i].SEK_per_kWh;
    slots15[offset + i] = parseFloat((sek * 100).toFixed(1)); // SEK → öre
  }
}

function fetchDay(date, offset) {
  var url = apiURL(date);
  return fetch(url)
    .then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(function(arr) {
      if (!Array.isArray(arr) || arr.length < 90) throw new Error('Bad data');
      parseSlots(arr, offset);
    });
}

function loadPrices() {
  var now    = new Date();
  var key    = now.getFullYear() + '-' + now.getMonth() + '-' + now.getDate();
  var doFetchToday = (fetchedDateKey !== key);

  if (doFetchToday) {
    // Reset on new day
    slots15 = new Array(192).fill(null);
    fetchedTomorrow = false;
    setStatus('loading', 'Loading\u2026');
  }

  var p = doFetchToday
    ? fetchDay(now, 0)
        .then(function() {
          fetchedDateKey = key;
          setStatus('ok', 'Live \u00b7 SE3');
        })
        .catch(function(e) {
          setStatus('error', 'Fetch failed');
          console.error('Today fetch:', e);
        })
    : Promise.resolve();

  return p.then(function() {
    // Try tomorrow after 13:00 (Nordpool publishes ~13:00 CET)
    if (!fetchedTomorrow && now.getHours() >= 13) {
      var tmr = new Date(now);
      tmr.setDate(tmr.getDate() + 1);
      return fetchDay(tmr, 96)
        .then(function() { fetchedTomorrow = true; })
        .catch(function() { /* not published yet */ });
    }
  });
}

function setStatus(type, msg) {
  var el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + type;
}

// ─── Color scale: green → lime → yellow → orange → red ───────────────────────
function colorFromNorm(n, alpha) {
  var stops = [
    [0.00, [74,  222, 128]],
    [0.35, [163, 230,  53]],
    [0.55, [250, 204,  21]],
    [0.72, [251, 146,  60]],
    [1.00, [248, 113, 113]]
  ];
  var lo = stops[0], hi = stops[stops.length - 1];
  for (var i = 0; i < stops.length - 1; i++) {
    if (n >= stops[i][0] && n <= stops[i + 1][0]) { lo = stops[i]; hi = stops[i + 1]; break; }
  }
  var t = (lo[0] === hi[0]) ? 0 : (n - lo[0]) / (hi[0] - lo[0]);
  var r = Math.round(lo[1][0] + (hi[1][0] - lo[1][0]) * t);
  var g = Math.round(lo[1][1] + (hi[1][1] - lo[1][1]) * t);
  var b = Math.round(lo[1][2] + (hi[1][2] - lo[1][2]) * t);
  return (alpha != null)
    ? 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')'
    : 'rgb(' + r + ',' + g + ',' + b + ')';
}

function globalMinMax() {
  var valid = slots15.filter(function(v) { return v !== null; });
  if (!valid.length) return { mn: 0, mx: 1 };
  return { mn: Math.min.apply(null, valid), mx: Math.max.apply(null, valid) };
}

function normGlobal(v) {
  var mm = globalMinMax();
  if (v === null) return 0.5;
  return mm.mx === mm.mn ? 0.5 : (v - mm.mn) / (mm.mx - mm.mn);
}

// Hourly average from today's slots (indices 0–95)
function todayHourlyAvg() {
  var out = [];
  for (var h = 0; h < 24; h++) {
    var chunk = slots15.slice(h * 4, h * 4 + 4).filter(function(v) { return v !== null; });
    out.push(chunk.length ? chunk.reduce(function(a, b) { return a + b; }, 0) / chunk.length : null);
  }
  return out;
}

// Current 15-min slot index within today (0–95)
function currentSlot(now) {
  return now.getHours() * 4 + Math.floor(now.getMinutes() / 15);
}

// ─── Bullet ring: 24 hourly dots ─────────────────────────────────────────────
function buildRing(now) {
  var ch    = now.getHours();
  var ring  = document.getElementById('ring');
  ring.innerHTML = '';
  var avgs  = todayHourlyAvg();
  var mm    = globalMinMax();

  for (var h = 0; h < 24; h++) {
    var el      = document.createElement('div');
    var val     = avgs[h];
    var hasData = (val !== null);
    var n       = hasData ? (mm.mx === mm.mn ? 0.5 : (val - mm.mn) / (mm.mx - mm.mn)) : 0.5;
    var clr     = hasData ? colorFromNorm(n) : 'rgba(255,255,255,0.12)';
    var cls     = 'hour-bullet';
    if (h === ch) cls += ' current';
    else if (h < ch) cls += ' past';
    el.className = cls;
    el.style.background = clr;
    el.style.setProperty('--clr', clr);

    var tip = document.createElement('span');
    tip.className = 'tip';
    tip.textContent = hasData
      ? ((h < 10 ? '0' : '') + h + ':00  ' + val.toFixed(1) + ' \u00f6re')
      : ((h < 10 ? '0' : '') + h + ':00  \u2014');
    el.appendChild(tip);
    ring.appendChild(el);
  }
}

// ─── 15-min bar chart: 48 bars = 12 hours ────────────────────────────────────
function buildBars(now) {
  var el        = document.getElementById('bars');
  el.innerHTML  = '';
  var startSlot = currentSlot(now); // today slot 0–95

  var vals = [];
  for (var i = 0; i < 48; i++) {
    var absSlot = startSlot + i; // may go into tomorrow (96–143)
    vals.push(slots15[absSlot] !== undefined ? slots15[absSlot] : null);
  }

  var validVals = vals.filter(function(v) { return v !== null; });
  var maxV = validVals.length ? Math.max.apply(null, validVals) : 1;

  for (var j = 0; j < 48; j++) {
    var absIdx  = startSlot + j;
    var slotH   = Math.floor(absIdx / 4) % 24;
    var slotM   = (absIdx % 4) * 15;
    var isOnHour = (slotM === 0);
    var isNow   = (j === 0);
    var val     = vals[j];

    var wrap = document.createElement('div');
    wrap.className = 'bar-wrap';

    var barH = (val !== null) ? Math.max(2, (val / maxV) * 44) : 2;
    var clr  = (val !== null) ? colorFromNorm(normGlobal(val)) : 'rgba(255,255,255,0.07)';

    var bar = document.createElement('div');
    bar.className = 'bar' + (isNow ? ' now' : '');
    bar.style.height = barH + 'px';
    bar.style.background = clr;
    bar.style.setProperty('--clr', clr);

    var lbl = document.createElement('div');
    lbl.className = 'bar-lbl' + (isNow ? ' now' : '');
    lbl.textContent = isOnHour ? ((slotH < 10 ? '0' : '') + slotH) : '';

    var tH  = (slotH < 10 ? '0' : '') + slotH;
    var tM  = (slotM === 0 ? '00' : '' + slotM);
    var tip = document.createElement('span');
    tip.className = 'tip';
    tip.textContent = (val !== null)
      ? (tH + ':' + tM + '  ' + val.toFixed(1) + ' \u00f6re')
      : (tH + ':' + tM + '  \u2014');

    wrap.appendChild(tip);
    wrap.appendChild(bar);
    wrap.appendChild(lbl);
    el.appendChild(wrap);
  }
}

// ─── Stats + background tint ──────────────────────────────────────────────────
function updateStats(now) {
  var avgs  = todayHourlyAvg();
  var valid = avgs.filter(function(v) { return v !== null; });
  if (!valid.length) return;

  var ch    = now.getHours();
  var mm    = globalMinMax();
  var normH = mm.mx === mm.mn ? 0.5 : ((avgs[ch] || mm.mn) - mm.mn) / (mm.mx - mm.mn);

  document.getElementById('sMin').textContent = Math.min.apply(null, valid).toFixed(0);
  document.getElementById('sAvg').textContent = (valid.reduce(function(a, b) { return a + b; }, 0) / valid.length).toFixed(0);
  document.getElementById('sMax').textContent = Math.max.apply(null, valid).toFixed(0);

  // Use exact 15-min slot price for "Now"
  var slot     = currentSlot(now);
  var nowPrice = slots15[slot];
  document.getElementById('sNow').textContent  = (nowPrice !== null) ? nowPrice.toFixed(0) : '\u2014';
  document.getElementById('badge').textContent = (nowPrice !== null)
    ? (nowPrice.toFixed(1) + ' \u00f6re/kWh')
    : '\u2014 \u00f6re/kWh';

  document.getElementById('clockSec').style.background = (nowPrice !== null)
    ? colorFromNorm(normH, 0.18)
    : 'rgba(255,255,255,0.04)';
}

// ─── Clock ────────────────────────────────────────────────────────────────────
var DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var lastHour = -1;
var lastSlot = -1;

function tick() {
  var now = new Date();
  var h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  var slot = currentSlot(now);

  document.getElementById('hhmm').textContent =
    (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m;
  document.getElementById('ss').textContent =
    (s < 10 ? '0' : '') + s;
  document.getElementById('dateLine').textContent =
    DAYS[now.getDay()] + ', ' + now.getDate() + ' ' + MONTHS[now.getMonth()];

  // Re-fetch on new hour (catches day rollover too)
  if (h !== lastHour) {
    lastHour = h;
    loadPrices().then(function() { buildRing(new Date()); buildBars(new Date()); updateStats(new Date()); });
  }

  // Rebuild bars every new 15-min slot
  if (slot !== lastSlot) {
    lastSlot = slot;
    buildBars(now);
  }

  buildRing(now);
  updateStats(now);
}

// Boot
loadPrices().then(function() { tick(); });
setInterval(tick, 1000);
</script>
</body>
</html>
