<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pollenprognos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f1117;
    --surface:  #181c25;
    --border:   #252a35;
    --text-pri: #e8eaf0;
    --text-sec: #8891a8;
    --text-dim: #4a5068;
  }

  html, body { width:100%; min-height:100%; background:var(--bg);
    font-family:'DM Sans',sans-serif; color:var(--text-pri);
    font-size:13px; -webkit-font-smoothing:antialiased; }

  .widget { padding:14px 14px 12px; display:flex; flex-direction:column; gap:10px; }

  /* ── Header ── */
  .header { display:flex; align-items:center; justify-content:space-between; }
  .header-left { display:flex; align-items:center; gap:8px; }
  .icon { width:28px; height:28px; border-radius:50%;
    background:linear-gradient(135deg,#1f3d1f,#0f2a1a);
    border:1px solid #2a5a2a; display:flex; align-items:center;
    justify-content:center; font-size:14px; flex-shrink:0; }
  .title  { font-size:13px; font-weight:600; letter-spacing:.02em; }
  .subtitle { font-size:10px; color:var(--text-sec); margin-top:1px; }
  .refresh-btn { background:none; border:none; cursor:pointer;
    color:var(--text-dim); padding:5px; border-radius:4px;
    font-size:15px; line-height:1; transition:color .2s; }
  .refresh-btn:hover { color:var(--text-sec); }
  .refresh-btn.spin { animation:spin .7s linear infinite; display:inline-block; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ── Grid layout helper ── */
  .day-grid, .pollen-row {
    display:grid; gap:3px;
  }

  /* ── Day column headers ── */
  .day-hdr { text-align:center; padding:5px 2px 4px;
    border-radius:7px; background:var(--surface); border:1px solid var(--border); }
  .day-hdr.today { background:#0f2318; border-color:#2a5a2a; }
  .day-name { font-size:10px; font-weight:600; text-transform:uppercase;
    letter-spacing:.04em; color:var(--text-pri); line-height:1; }
  .day-date { font-family:'DM Mono',monospace; font-size:9px;
    color:var(--text-dim); margin-top:2px; line-height:1; }
  .day-hdr.today .day-name { color:#4ade80; }
  .day-hdr.today .day-date { color:#2a6a3a; }

  /* ── Pollen name column ── */
  .pollen-name { font-size:11px; font-weight:500; color:var(--text-sec);
    padding:0 4px 0 2px; white-space:nowrap; overflow:hidden;
    text-overflow:ellipsis; display:flex; align-items:center; }

  /* ── Level cells ── */
  .cell { border-radius:5px; padding:5px 2px; text-align:center;
    font-size:10px; font-weight:600; font-family:'DM Mono',monospace;
    cursor:default; transition:transform .12s; }
  .cell:not(.lv0):hover { transform:scale(1.08); }
  .lv0 { background:#1a1e28; color:#3a4060; }
  .lv1 { background:#0f2d1f; color:#4ade80; }
  .lv2 { background:#1f2e0a; color:#a3e635; }
  .lv3 { background:#2e2500; color:#facc15; }
  .lv4 { background:#2e1800; color:#fb923c; }
  .lv5 { background:#2e0a0a; color:#f87171; }

  /* ── Legend ── */
  .legend { display:flex; gap:7px; flex-wrap:wrap; padding:8px 3px 2px;
    border-top:1px solid var(--border); }
  .leg-item { display:flex; align-items:center; gap:4px;
    font-size:9px; color:var(--text-dim); font-family:'DM Mono',monospace; }
  .leg-dot { width:7px; height:7px; border-radius:2px; flex-shrink:0; }

  /* ── Footer ── */
  .footer { font-size:9px; color:var(--text-dim); text-align:right;
    font-family:'DM Mono',monospace; padding-right:2px; }

  /* ── Status / loading ── */
  .status { text-align:center; padding:22px 0; display:flex;
    flex-direction:column; align-items:center; gap:8px; }
  .status-icon { font-size:22px; }
  .status-msg  { font-size:11px; color:var(--text-dim); max-width:230px; line-height:1.5; }
  .status-msg.err { color:#f87171; }

  /* ── Skeleton loader ── */
  .sk { border-radius:4px;
    background:linear-gradient(90deg,var(--surface) 25%,#1e2435 50%,var(--surface) 75%);
    background-size:200% 100%; animation:shimmer 1.5s infinite; }
  @keyframes shimmer { to { background-position:-200% 0; } }
</style>
</head>
<body>
<div class="widget">

  <div class="header">
    <div class="header-left">
      <div class="icon">🌿</div>
      <div>
        <div class="title">Pollenprognos</div>
        <div class="subtitle" id="sub">Hämtar data…</div>
      </div>
    </div>
    <button class="refresh-btn" id="refreshBtn" title="Uppdatera" onclick="init()">↺</button>
  </div>

  <div id="content">
    <div class="status">
      <div class="sk" style="width:28px;height:28px;border-radius:50%"></div>
      <div class="sk" style="width:140px;height:10px;margin-top:4px"></div>
    </div>
  </div>

  <div class="footer" id="footer"></div>

</div>
<script>
// ── CONFIG ──────────────────────────────────────────────────────────
const REGION_NAME = 'Stockholm';   // must match a region name returned by the API
const REFRESH_MS  = 6 * 60 * 60 * 1000;
const BASE        = 'https://api.pollenrapporten.se/v1';
const PROXY       = 'https://corsproxy.io/?url=';
// ────────────────────────────────────────────────────────────────────

const DAY_SV = ['Sön','Mån','Tis','Ons','Tor','Fre','Lör'];

// Try direct first (API supports CORS), fall back to proxy
async function apiFetch(path) {
  const url = BASE + path;
  let res;
  try {
    res = await fetch(url, { cache:'no-store' });
    if (res.ok) return res.json();
  } catch (_) { /* fall through */ }
  // Proxy fallback
  res = await fetch(PROXY + encodeURIComponent(url), { cache:'no-store' });
  if (!res.ok) throw new Error(`HTTP ${res.status} for ${path}`);
  return res.json();
}

// Convert a numeric pollen count → level 0-5 using the type's thresholds
function getLevel(count, pt) {
  if (count === null || count === undefined || count < 0) return 0;
  if (count === 0)          return 0;
  if (count < pt.thresholdLow)      return 0;
  if (count < pt.thresholdMedium)   return 1;   // Låg
  if (count < pt.thresholdHigh)     return 2;   // Medel
  if (count < pt.thresholdVeryHigh) return 3;   // Hög
  return 4;                                      // Mycket hög
}

const LV_LABEL = ['–','L','M','H','H+'];
const LV_TIP   = ['Ingen/saknas','Låg','Medel','Hög','Mycket hög'];

function renderWidget(regionName, pollenTypes, forecasts) {

  // Map pollenId → type object
  const ptMap = {};
  pollenTypes.forEach(pt => { ptMap[pt.id] = pt; });

  // ── Group forecast items ──────────────────────────────────────────
  // Expected item fields: pollen_id, date (ISO string), level (numeric count)
  const dateSet = new Set();
  const grid = {};   // grid[pollenId][dateStr] = level count

  forecasts.forEach(fc => {
    const dateStr = (fc.date || fc.forecast_date || '').slice(0, 10);
    if (!dateStr) return;
    // Accept any field that looks like a numeric pollen count
    const count = fc.level ?? fc.levelCount ?? fc.count ?? fc.value ?? null;
    dateSet.add(dateStr);
    if (!grid[fc.pollen_id]) grid[fc.pollen_id] = {};
    grid[fc.pollen_id][dateStr] = count;
  });

  const today = new Date().toISOString().slice(0, 10);
  const dates = Array.from(dateSet).sort().slice(0, 5);
  const numCols = Math.max(dates.length, 1);
  const GCOLS = `80px repeat(${numCols}, 1fr)`;

  // Only show types that have forecast data and are forecast-enabled
  const activeTypes = pollenTypes.filter(
    pt => pt.hasForecasts && grid[pt.id] && Object.keys(grid[pt.id]).length > 0
  );

  let html = '';

  // ── Day headers ───────────────────────────────────────────────────
  html += `<div class="day-grid" style="grid-template-columns:${GCOLS}">`;
  html += '<div></div>';
  dates.forEach(d => {
    const isToday = (d === today);
    const dt      = new Date(d + 'T12:00:00');
    const dayName = isToday ? 'Idag' : DAY_SV[dt.getDay()];
    const dayDate = `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}`;
    html += `<div class="day-hdr${isToday ? ' today' : ''}">
               <div class="day-name">${dayName}</div>
               <div class="day-date">${dayDate}</div>
             </div>`;
  });
  html += '</div>';

  // ── Pollen rows ───────────────────────────────────────────────────
  html += '<div style="display:flex;flex-direction:column;gap:3px">';

  if (activeTypes.length === 0) {
    html += `<div class="status">
               <div class="status-msg">
                 Ingen prognosdata för ${regionName} just nu.<br>
                 Prova igen senare.
               </div>
             </div>`;
  } else {
    activeTypes.forEach(pt => {
      html += `<div class="pollen-row" style="grid-template-columns:${GCOLS}">
                 <div class="pollen-name" title="${pt.name}">${pt.name}</div>`;
      dates.forEach(d => {
        const count = grid[pt.id]?.[d];
        const lv    = getLevel(count, pt);
        const tip   = `${pt.name} ${d}: ${LV_TIP[lv]}${count != null ? ` (${count})` : ''}`;
        html += `<div class="cell lv${lv}" title="${tip}">${LV_LABEL[lv]}</div>`;
      });
      html += '</div>';
    });
  }
  html += '</div>';

  // ── Legend ────────────────────────────────────────────────────────
  const LEGEND = [
    { col:'#4ade80', label:'L – Låg' },
    { col:'#facc15', label:'M – Medel' },
    { col:'#fb923c', label:'H – Hög' },
    { col:'#f87171', label:'H+' },
  ];
  html += '<div class="legend">';
  LEGEND.forEach(l =>
    html += `<div class="leg-item">
               <div class="leg-dot" style="background:${l.col};opacity:.8"></div>
               <span>${l.label}</span>
             </div>`
  );
  html += '</div>';

  document.getElementById('content').innerHTML  = html;
  document.getElementById('sub').textContent    = `${regionName} · Pollenrapporten`;
  document.getElementById('footer').textContent =
    'Uppdaterad ' + new Date().toLocaleTimeString('sv-SE',{ hour:'2-digit', minute:'2-digit' });
}

// ── Bootstrap ─────────────────────────────────────────────────────────
async function init() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spin');
  document.getElementById('sub').textContent = 'Hämtar data…';

  try {
    // Parallel fetch: pollen types + regions list
    const [typesData, regionsData] = await Promise.all([
      apiFetch('/pollen-types?offset=0&limit=100'),
      apiFetch('/regions?offset=0&limit=100'),
    ]);

    const pollenTypes = typesData.items  || [];
    const regions     = regionsData.items || [];

    // Find our target region (case-insensitive substring match)
    const region = regions.find(r =>
      (r.name || '').toLowerCase().includes(REGION_NAME.toLowerCase())
    );
    if (!region) {
      const names = regions.map(r => r.name).join(', ');
      throw new Error(`"${REGION_NAME}" ej hittad. Tillgängliga regioner: ${names || 'inga'}`);
    }

    // Fetch forecasts for this region
    const fcData   = await apiFetch(
      `/forecasts?region_id=${encodeURIComponent(region.id)}&current=true&limit=300`
    );
    const forecasts = fcData.items || [];

    renderWidget(region.name, pollenTypes, forecasts);

  } catch (err) {
    document.getElementById('content').innerHTML =
      `<div class="status">
         <div class="status-icon">⚠️</div>
         <div class="status-msg err">Kunde inte hämta data.<br><br>${err.message}</div>
       </div>`;
    document.getElementById('sub').textContent    = 'Fel vid hämtning';
    document.getElementById('footer').textContent = '';
    console.error('[Pollen widget]', err);
  } finally {
    btn.classList.remove('spin');
  }
}

init();
setInterval(init, REFRESH_MS);
</script>
</body>
</html>
