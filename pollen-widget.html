<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pollenprognos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --bg:#0f1117; --surface:#181c25; --border:#252a35;
    --text:#e8eaf0; --sec:#8891a8; --dim:#4a5068;
  }
  html,body { width:100%; min-height:100%; background:var(--bg);
    font-family:'DM Sans',sans-serif; color:var(--text);
    font-size:13px; -webkit-font-smoothing:antialiased; }
  .widget { padding:14px 14px 12px; display:flex; flex-direction:column; gap:10px; }

  .hdr   { display:flex; align-items:center; justify-content:space-between; }
  .hdr-l { display:flex; align-items:center; gap:8px; }
  .icon  { width:28px; height:28px; border-radius:50%;
    background:linear-gradient(135deg,#1f3d1f,#0f2a1a); border:1px solid #2a5a2a;
    display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
  .title    { font-size:13px; font-weight:600; letter-spacing:.02em; }
  .subtitle { font-size:10px; color:var(--sec); margin-top:1px; }

  .refresh-btn { background:none; border:none; cursor:pointer; color:var(--dim);
    padding:5px; border-radius:4px; font-size:15px; line-height:1; transition:color .2s; }
  .refresh-btn:hover { color:var(--sec); }
  .refresh-btn.spin { animation:spin .7s linear infinite; display:inline-block; }
  @keyframes spin { to { transform:rotate(360deg); } }

  .grid { display:grid; gap:3px; }

  .day-hdr { text-align:center; padding:5px 2px 4px;
    border-radius:7px; background:var(--surface); border:1px solid var(--border); }
  .day-hdr.today { background:#0f2318; border-color:#2a5a2a; }
  .day-name { font-size:10px; font-weight:600; text-transform:uppercase;
    letter-spacing:.04em; line-height:1; }
  .day-date { font-family:'DM Mono',monospace; font-size:9px;
    color:var(--dim); margin-top:2px; line-height:1; }
  .day-hdr.today .day-name { color:#4ade80; }
  .day-hdr.today .day-date { color:#2a6a3a; }

  .p-name { font-size:11px; font-weight:500; color:var(--sec);
    padding:0 4px 0 2px; white-space:nowrap; overflow:hidden;
    text-overflow:ellipsis; display:flex; align-items:center; }
  .cell { border-radius:5px; padding:5px 2px; text-align:center;
    font-size:10px; font-weight:600; font-family:'DM Mono',monospace;
    cursor:default; transition:transform .12s; }
  .cell:not(.lv0):hover { transform:scale(1.08); }
  .lv0 { background:#1a1e28; color:#3a4060; }
  .lv1 { background:#0f2d1f; color:#4ade80; }
  .lv2 { background:#1f2e0a; color:#a3e635; }
  .lv3 { background:#2e2500; color:#facc15; }
  .lv4 { background:#2e1800; color:#fb923c; }
  .lv5 { background:#2e0a0a; color:#f87171; }

  .legend { display:flex; gap:7px; flex-wrap:wrap;
    padding:8px 3px 2px; border-top:1px solid var(--border); }
  .leg { display:flex; align-items:center; gap:4px;
    font-size:9px; color:var(--dim); font-family:'DM Mono',monospace; }
  .leg-dot { width:7px; height:7px; border-radius:2px; flex-shrink:0; }

  .footer { font-size:9px; color:var(--dim); text-align:right;
    font-family:'DM Mono',monospace; padding-right:2px; }

  .status { text-align:center; padding:22px 0;
    display:flex; flex-direction:column; align-items:center; gap:8px; }
  .s-icon { font-size:22px; }
  .s-msg  { font-size:11px; color:var(--dim); max-width:240px; line-height:1.6; }
  .s-msg.err { color:#f87171; }

  .sk { border-radius:4px;
    background:linear-gradient(90deg,var(--surface) 25%,#1e2435 50%,var(--surface) 75%);
    background-size:200% 100%; animation:shimmer 1.5s infinite; }
  @keyframes shimmer { to { background-position:-200% 0; } }
</style>
</head>
<body>
<div class="widget">
  <div class="hdr">
    <div class="hdr-l">
      <div class="icon">🌿</div>
      <div>
        <div class="title">Pollenprognos</div>
        <div class="subtitle" id="sub">Hämtar data…</div>
      </div>
    </div>
    <button class="refresh-btn" id="btn" title="Uppdatera" onclick="init()">↺</button>
  </div>
  <div id="content">
    <div class="status">
      <div class="sk" style="width:28px;height:28px;border-radius:50%"></div>
      <div class="sk" style="width:140px;height:10px;margin-top:6px"></div>
    </div>
  </div>
  <div class="footer" id="footer"></div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────
const REGION_NAME = 'Stockholm';
const REFRESH_MS  = 6 * 60 * 60 * 1000;
const API         = 'https://api.pollenrapporten.se/v1';
// ────────────────────────────────────────────────────────────────

const DAY_SV   = ['Sön','Mån','Tis','Ons','Tor','Fre','Lör'];
const LV_LABEL = ['–', 'L', 'L-M', 'M', 'H', 'H+'];
const LV_TIP   = ['Ingen', 'Låga', 'Låga-måttliga', 'Måttliga', 'Höga', 'Mycket höga'];

function countToLevel(count, t) {
  if (!count || count <= 0 || !t) return 0;
  if (count < t.low)       return 0;
  if (count < t.medium)    return 1;
  if (count < t.high)      return 2;
  if (count < t.vhigh)     return 3;
  if (count < t.vhigh * 2) return 4;
  return 5;
}

async function get(path) {
  const r = await fetch(API + path, { cache: 'no-store' });
  if (!r.ok) throw new Error(path + ' → HTTP ' + r.status);
  return r.json();
}

async function init() {
  const btn = document.getElementById('btn');
  btn.classList.add('spin');
  document.getElementById('sub').textContent = 'Hämtar data…';

  try {
    // 1. Fetch regions + pollen types in parallel
    const [regData, typeData] = await Promise.all([
      get('/regions?offset=0&limit=100'),
      get('/pollen-types?offset=0&limit=100')
    ]);

    // 2. Build threshold lookup
    const types = typeData.items || [];
    const thresholds = {};
    types.forEach(pt => {
      thresholds[pt.id] = {
        low: pt.thresholdLow, medium: pt.thresholdMedium,
        high: pt.thresholdHigh, vhigh: pt.thresholdVeryHigh
      };
    });

    // 3. Find Stockholm region
    const region = (regData.items || []).find(r =>
      (r.name || '').toLowerCase().indexOf(REGION_NAME.toLowerCase()) >= 0
    );
    if (!region) {
      const names = (regData.items || []).map(r => r.name).join(', ');
      throw new Error('Region "' + REGION_NAME + '" ej hittad. Finns: ' + names);
    }

    // 4. Fetch forecasts
    const fcData = await get(
      '/forecasts?region_id=' + encodeURIComponent(region.id) +
      '&current=true&limit=500'
    );
    const items = fcData.items || [];

    if (items.length === 0) {
      throw new Error(
        'API svarade OK men returnerade inga prognosdata för ' + region.name +
        '. Prognosen kanske inte är publicerad ännu för idag.'
      );
    }

    // 5. Build date × pollen grid
    const dateSet = {};
    const grid    = {};
    items.forEach(fc => {
      const pid   = fc.pollen_id || fc.pollenId;
      const date  = (fc.date || fc.forecast_date || '').slice(0, 10);
      const count = fc.level != null ? fc.level :
                    fc.levelCount != null ? fc.levelCount :
                    fc.count != null ? fc.count : null;
      if (!pid || !date) return;
      dateSet[date] = true;
      if (!grid[pid]) grid[pid] = {};
      grid[pid][date] = count;
    });

    const dates = Object.keys(dateSet).sort().slice(0, 5);
    const today = new Date().toISOString().slice(0, 10);

    // 6. Build display rows — only types with forecast data
    const rows = types
      .filter(pt => pt.hasForecasts && grid[pt.id])
      .map(pt => ({
        name:  pt.name,
        cells: dates.map(d => countToLevel(grid[pt.id][d], thresholds[pt.id]))
      }));

    // Sort: active rows first, zero-only last
    rows.sort((a, b) => {
      const aMax = Math.max(...a.cells);
      const bMax = Math.max(...b.cells);
      return bMax - aMax;
    });

    // 7. Render
    const numDays = dates.length;
    const GCOLS   = '80px repeat(' + numDays + ', 1fr)';
    let html = '';

    // Day headers
    html += '<div class="grid" style="grid-template-columns:' + GCOLS + '">';
    html += '<div></div>';
    dates.forEach((d, i) => {
      const isToday = d === today;
      const dt      = new Date(d + 'T12:00:00');
      const label   = isToday ? 'Idag' : DAY_SV[dt.getDay()];
      const dstr    = ('0' + dt.getDate()).slice(-2) + '/' +
                      ('0' + (dt.getMonth() + 1)).slice(-2);
      html += '<div class="day-hdr' + (isToday ? ' today' : '') + '">' +
              '<div class="day-name">' + label + '</div>' +
              '<div class="day-date">' + dstr  + '</div></div>';
    });
    html += '</div>';

    // Pollen rows
    html += '<div style="display:flex;flex-direction:column;gap:3px">';
    rows.forEach(row => {
      html += '<div class="grid" style="grid-template-columns:' + GCOLS + '">';
      html += '<div class="p-name" title="' + row.name + '">' + row.name + '</div>';
      row.cells.forEach((lv, ci) => {
        const tip = row.name + ' ' + dates[ci] + ': ' + LV_TIP[lv] + ' halter';
        html += '<div class="cell lv' + lv + '" title="' + tip + '">' +
                LV_LABEL[lv] + '</div>';
      });
      html += '</div>';
    });
    html += '</div>';

    // Legend
    const LEGEND = [
      { c:'#4ade80', l:'L – Låga' }, { c:'#a3e635', l:'L-M' },
      { c:'#facc15', l:'M – Måttliga' }, { c:'#fb923c', l:'H – Höga' },
      { c:'#f87171', l:'H+' }
    ];
    html += '<div class="legend">';
    LEGEND.forEach(x => {
      html += '<div class="leg"><div class="leg-dot" style="background:' + x.c +
              ';opacity:.8"></div><span>' + x.l + '</span></div>';
    });
    html += '</div>';

    document.getElementById('content').innerHTML  = html;
    document.getElementById('sub').textContent    = region.name + ' · Pollenrapporten';
    document.getElementById('footer').textContent =
      'Uppdaterad ' + new Date().toLocaleTimeString('sv-SE',
        { hour: '2-digit', minute: '2-digit' });

  } catch (err) {
    document.getElementById('content').innerHTML =
      '<div class="status"><div class="s-icon">⚠️</div>' +
      '<div class="s-msg err">' + (err.message || String(err)) + '</div></div>';
    document.getElementById('sub').textContent    = 'Fel vid hämtning';
    document.getElementById('footer').textContent = '';
    console.error('[Pollen]', err);
  }

  btn.classList.remove('spin');
}

init();
setInterval(init, REFRESH_MS);
</script>
</body>
</html>
